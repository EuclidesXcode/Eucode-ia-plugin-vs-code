<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eucode AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            background: #0a0a0f;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        #header {
            padding: 10px 14px;
            border-bottom: 1px solid #13131f;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d0d1a;
            flex-shrink: 0;
        }

        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e05555;
            flex-shrink: 0;
            transition: background 0.4s, box-shadow 0.4s;
        }
        #status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e88;
        }

        #header .title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #3a7bd5;
            flex: 1;
        }

        #history-btn {
            background: none;
            border: 1px solid #1e2a3a;
            border-radius: 4px;
            color: #3a7bd5;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 4px 10px;
            transition: border-color 0.15s, background 0.15s;
        }
        #history-btn:hover { border-color: #3a7bd5; background: #0d1a2e; }
        #history-btn.hidden { display: none; }

        /* ── Config panel ── */
        #config-panel {
            display: none;
            flex-direction: column;
            gap: 14px;
            padding: 16px;
            border-bottom: 1px solid #13131f;
            background: #0d0d1a;
        }
        #config-panel.open { display: flex; }

        .config-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #3a5080;
            margin-bottom: 6px;
        }

        .config-select,
        .config-input {
            width: 100%;
            background: #0a0a15;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            padding: 8px 12px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .config-select:focus,
        .config-input:focus {
            border-color: #3a7bd5;
            box-shadow: 0 0 0 2px #3a7bd520;
        }
        .config-select { cursor: pointer; }
        .config-input.mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }

        .config-hint { font-size: 11px; color: #2a3a4a; margin-top: 5px; }

        .config-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }

        #config-feedback { font-size: 11px; color: #22c55e; flex: 1; }

        .config-save-btn {
            background: #1a2a4a;
            border: 1px solid #3a7bd5;
            color: #3a7bd5;
            border-radius: 6px;
            padding: 7px 18px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .config-save-btn:hover { background: #3a7bd5; color: #fff; }

        .config-cancel-btn {
            background: none;
            border: 1px solid #1a1a2e;
            color: #3a5080;
            border-radius: 6px;
            padding: 7px 18px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .config-cancel-btn:hover { border-color: #3a5080; color: #7090b0; }

        /* ── Chat ── */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: #1a1a2e transparent;
        }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 2px; }

        .message-row { display: flex; flex-direction: column; gap: 5px; max-width: 100%; }
        .message-row.user { align-items: flex-end; }
        .message-row.agent { align-items: flex-start; }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 4px;
        }

        .message-avatar {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }
        .agent .message-avatar { background: #1a2a4a; color: #3a7bd5; }
        .user .message-avatar { background: #1a2a3a; color: #7ab3ff; }

        .message-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .agent .message-label { color: #3a7bd5; }
        .user .message-label { color: #5a8ac0; }

        .message-bubble {
            padding: 11px 15px;
            border-radius: 12px;
            line-height: 1.65;
            max-width: 90%;
            word-break: break-word;
            position: relative;
        }

        .user .message-bubble {
            background: linear-gradient(135deg, #1a2a4a 0%, #0f1e35 100%);
            border: 1px solid #2a4a7a;
            color: #c9d8f0;
            border-radius: 12px 12px 2px 12px;
        }

        .agent .message-bubble {
            background: #0d0d1a;
            border: 1px solid #13132a;
            color: #c9d1d9;
            border-radius: 12px 12px 12px 2px;
            width: 100%;
            max-width: 100%;
        }

        .agent .message-bubble.loading {
            color: #3a5080;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3a7bd5;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Markdown */
        .message-bubble p { margin-bottom: 8px; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble strong { color: #e2e8f0; font-weight: 600; }
        .message-bubble em { color: #8ba3c0; }
        .message-bubble ul, .message-bubble ol { padding-left: 18px; margin-bottom: 8px; }
        .message-bubble li { margin-bottom: 3px; }
        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            color: #c9d8f0;
            font-weight: 600;
            margin: 14px 0 6px;
            line-height: 1.3;
        }
        .message-bubble h1 { font-size: 15px; border-bottom: 1px solid #13132a; padding-bottom: 6px; }
        .message-bubble h2 { font-size: 13px; }
        .message-bubble h3 { font-size: 12px; color: #5a8ac0; }
        .message-bubble a { color: #3a7bd5; text-decoration: none; }
        .message-bubble a:hover { text-decoration: underline; }

        .message-bubble code:not(pre code) {
            background: #0a0a1f;
            border: 1px solid #1a1a3a;
            color: #7ab3ff;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 11.5px;
        }

        .message-bubble pre {
            margin: 10px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1a1a2e;
        }

        .code-header {
            background: #0d0d20;
            padding: 6px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a2e;
        }
        .code-lang {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #3a7bd5;
        }
        .copy-btn {
            font-size: 10px;
            color: #3a5080;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: color 0.15s;
            font-weight: 600;
        }
        .copy-btn:hover { color: #7ab3ff; }

        .message-bubble pre code {
            display: block;
            padding: 14px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-x: auto;
            background: #080810;
        }

        /* ── Image preview ── */
        #image-preview {
            padding: 6px 16px 0;
            display: none;
            align-items: center;
            gap: 8px;
            background: #0d0d1a;
        }
        #image-preview img {
            height: 44px;
            border-radius: 6px;
            border: 1px solid #1a1a2e;
            object-fit: cover;
        }
        #image-preview-name { font-size: 11px; color: #3a5080; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #image-remove {
            background: none;
            border: none;
            color: #3a3a5a;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            transition: color 0.15s;
            line-height: 1;
        }
        #image-remove:hover { color: #e05555; }

        .msg-image {
            max-width: 100%;
            max-height: 260px;
            border-radius: 8px;
            border: 1px solid #1a1a2e;
            margin-bottom: 8px;
            display: block;
        }

        /* ── Input area ── */
        #input-area {
            padding: 12px 14px;
            border-top: 1px solid #13131f;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: #0d0d1a;
        }

        .icon-btn {
            background: none;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            color: #3a5080;
            cursor: pointer;
            padding: 8px 10px;
            font-size: 15px;
            line-height: 1;
            flex-shrink: 0;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .icon-btn:hover { border-color: #3a7bd5; color: #3a7bd5; background: #0d1a2e; }

        #user-input {
            flex: 1;
            background: #0a0a15;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            padding: 9px 13px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.55;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        #user-input:focus {
            border-color: #3a7bd5;
            box-shadow: 0 0 0 2px #3a7bd520;
        }
        #user-input::placeholder { color: #2a3a4a; }

        #send-btn {
            background: #1a2a4a;
            border: 1px solid #3a7bd5;
            color: #3a7bd5;
            border-radius: 8px;
            padding: 9px 18px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #send-btn:hover { background: #3a7bd5; color: #fff; }
        #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ── Status bar ── */
        #status-bar {
            font-size: 11px;
            color: #3a7bd5;
            padding: 3px 4px;
            font-style: italic;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #status-bar::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3a7bd5;
            animation: pulse-dot 1.2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }

        /* ── Divider de data ── */
        .day-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1a2a3a;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .day-divider::before, .day-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #13132a;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="status-dot"></div>
        <span class="title">Eucode IA</span>
        <button id="history-btn" class="hidden">Retomar conversa</button>
    </div>

    <div id="config-panel">
        <div>
            <div class="config-label">Provedor</div>
            <select id="config-provider" class="config-select">
                <option value="lmstudio">LM Studio</option>
                <option value="anthropic">Anthropic / Ollama</option>
                <option value="ollama">Outro (OpenAI-compativel)</option>
            </select>
        </div>
        <div>
            <div class="config-label">Host</div>
            <input id="config-host-input" class="config-input mono" type="text" placeholder="http://localhost:1234" spellcheck="false">
            <div class="config-hint">Endereco completo com porta. Ex: http://10.100.0.22:11434</div>
        </div>
        <div>
            <div class="config-label">API Key <span style="color:#1a2a3a;font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></div>
            <input id="config-key-input" class="config-input mono" type="password" placeholder="sk-..." spellcheck="false" autocomplete="off">
        </div>
        <div class="config-actions">
            <span id="config-feedback"></span>
            <button class="config-cancel-btn" id="config-cancel-btn">Cancelar</button>
            <button class="config-save-btn" id="config-save-btn">Salvar</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="message-row agent">
            <div class="message-meta">
                <div class="message-avatar">EI</div>
                <span class="message-label">Eucode IA</span>
            </div>
            <div class="message-bubble">Ola! Como posso ajudar?</div>
        </div>
    </div>

    <div id="image-preview">
        <img id="image-preview-img" src="" alt="preview">
        <span id="image-preview-name"></span>
        <button id="image-remove" title="Remover">&#x2715;</button>
    </div>

    <div id="input-area">
        <button id="config-btn" class="icon-btn" title="Configuracoes">&#9881;</button>
        <button id="image-btn" class="icon-btn" title="Anexar imagem">&#128247;</button>
        <textarea id="user-input" rows="1" placeholder="Pergunte algo ou descreva uma tarefa..."></textarea>
        <button id="send-btn">Enviar</button>
    </div>
    <input type="file" id="image-input" accept="image/*" style="display:none">

    <script>
        const vscode = acquireVsCodeApi();
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');

        const imageBtn = document.getElementById('image-btn');
        const imageInput = document.getElementById('image-input');
        const imagePreview = document.getElementById('image-preview');
        const imagePreviewImg = document.getElementById('image-preview-img');
        const imagePreviewName = document.getElementById('image-preview-name');
        const imageRemove = document.getElementById('image-remove');

        const configBtn = document.getElementById('config-btn');
        const configPanel = document.getElementById('config-panel');
        const configProvider = document.getElementById('config-provider');
        const configHostInput = document.getElementById('config-host-input');
        const configKeyInput = document.getElementById('config-key-input');
        const configSaveBtn = document.getElementById('config-save-btn');
        const configCancelBtn = document.getElementById('config-cancel-btn');
        const configFeedback = document.getElementById('config-feedback');
        const historyBtn = document.getElementById('history-btn');

        let pendingImage = null;
        let savedSettings = { provider: 'lmstudio', apiHost: '', apiKey: '' };
        let pendingHistory = null;

        // ── Config ──
        configBtn.addEventListener('click', () => {
            const isOpen = configPanel.classList.toggle('open');
            if (isOpen) {
                configProvider.value = savedSettings.provider;
                configHostInput.value = savedSettings.apiHost;
                configKeyInput.value = '';
                configFeedback.textContent = '';
            }
        });

        configCancelBtn.addEventListener('click', () => {
            configPanel.classList.remove('open');
            configFeedback.textContent = '';
        });

        configSaveBtn.addEventListener('click', () => {
            const host = configHostInput.value.trim();
            if (!host) { return; }
            vscode.postMessage({
                command: 'save_config',
                provider: configProvider.value,
                apiHost: host,
                apiKey: configKeyInput.value.trim(),
            });
        });

        // ── History ──
        historyBtn.addEventListener('click', () => {
            if (!pendingHistory) { return; }
            restoreHistory(pendingHistory);
            pendingHistory = null;
            historyBtn.classList.add('hidden');
        });

        function restoreHistory(entries) {
            const rows = chatContainer.querySelectorAll('.message-row');
            if (rows.length === 1) { rows[0].remove(); }
            entries.forEach(e => appendMessage(e.content, e.role === 'user' ? 'user' : 'agent'));
        }

        // ── Image ──
        imageBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) { return; }
            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                const match = dataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
                if (!match) { return; }
                pendingImage = { base64: match[2], mimeType: match[1], name: file.name };
                imagePreviewImg.src = dataUrl;
                imagePreviewName.textContent = file.name;
                imagePreview.style.display = 'flex';
            };
            reader.readAsDataURL(file);
            this.value = '';
        });

        imageRemove.addEventListener('click', () => {
            pendingImage = null;
            imagePreview.style.display = 'none';
            imagePreviewImg.src = '';
        });

        // ── Markdown ──
        marked.setOptions({ breaks: true });
        const renderer = new marked.Renderer();
        renderer.code = function(code, lang) {
            const language = lang || 'plaintext';
            const highlighted = hljs.getLanguage(language)
                ? hljs.highlight(code, { language }).value
                : hljs.highlightAuto(code).value;
            return `<pre><div class="code-header"><span class="code-lang">${language}</span><button class="copy-btn" onclick="copyCode(this)">Copiar</button></div><code class="hljs language-${language}">${highlighted}</code></pre>`;
        };
        marked.use({ renderer });

        function copyCode(btn) {
            const code = btn.closest('pre').querySelector('code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'Copiado';
                setTimeout(() => btn.textContent = 'Copiar', 2000);
            });
        }

        // ── Messages ──
        function appendMessage(text, role, isLoading = false, imageDataUrl = null) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const meta = document.createElement('div');
            meta.className = 'message-meta';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'VC' : '[E]';

            const label = document.createElement('span');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'Voce' : 'Eucode IA';

            if (role === 'agent') {
                meta.appendChild(avatar);
                meta.appendChild(label);
            } else {
                meta.appendChild(label);
                meta.appendChild(avatar);
            }

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble' + (isLoading ? ' loading' : '');

            if (imageDataUrl) {
                const img = document.createElement('img');
                img.src = imageDataUrl;
                img.className = 'msg-image';
                bubble.appendChild(img);
            }

            if (isLoading) {
                const dots = document.createElement('div');
                dots.className = 'loading-dots';
                dots.innerHTML = '<span></span><span></span><span></span>';
                bubble.appendChild(document.createTextNode('Processando'));
                bubble.appendChild(dots);
                bubble.dataset.loading = 'true';
            } else if (role === 'agent') {
                const md = document.createElement('div');
                md.innerHTML = marked.parse(text);
                bubble.appendChild(md);
            } else if (text) {
                bubble.appendChild(document.createTextNode(text));
            }

            row.appendChild(meta);
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return row;
        }

        // ── Messages from extension ──
        window.addEventListener('message', function(event) {
            const msg = event.data;

            if (msg.command === 'load_config') {
                savedSettings = { provider: msg.provider, apiHost: msg.apiHost, apiKey: msg.apiKey || '' };
            } else if (msg.command === 'load_history') {
                if (msg.entries && msg.entries.length > 0) {
                    pendingHistory = msg.entries;
                    historyBtn.classList.remove('hidden');
                }
            } else if (msg.command === 'connection_status') {
                statusDot.classList.toggle('online', msg.online);
            } else if (msg.command === 'config_saved') {
                savedSettings.provider = configProvider.value;
                savedSettings.apiHost = configHostInput.value.trim();
                configFeedback.textContent = 'Configuracao salva.';
                setTimeout(() => {
                    configFeedback.textContent = '';
                    configPanel.classList.remove('open');
                }, 1200);
            } else if (msg.command === 'status') {
                updateStatus(msg.text);
            } else if (msg.command === 'agent_response') {
                clearStatus();
                const loading = chatContainer.querySelector('[data-loading="true"]');
                if (loading) { loading.closest('.message-row').remove(); }
                appendMessage(msg.text, 'agent');
                sendBtn.disabled = false;
            }
        });

        function updateStatus(text) {
            let el = document.getElementById('status-bar');
            if (!el) {
                el = document.createElement('div');
                el.id = 'status-bar';
                chatContainer.appendChild(el);
            }
            el.textContent = text;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearStatus() {
            const el = document.getElementById('status-bar');
            if (el) { el.remove(); }
        }

        // ── Send ──
        function sendMessage() {
            const text = input.value.trim();
            if (!text && !pendingImage) { return; }

            const imageDataUrl = pendingImage ? `data:${pendingImage.mimeType};base64,${pendingImage.base64}` : null;
            appendMessage(text, 'user', false, imageDataUrl);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            appendMessage('', 'agent', true);

            vscode.postMessage({
                command: 'user_input',
                text: text || '(analise esta imagem)',
                image: pendingImage ? { base64: pendingImage.base64, mimeType: pendingImage.mimeType } : null,
            });

            pendingImage = null;
            imagePreview.style.display = 'none';
            imagePreviewImg.src = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
        });

        vscode.postMessage({ command: 'webview_ready' });
    </script>
</body>
</html>
