<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eucode AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .mi {
            font-family: 'Material Symbols Rounded';
            font-size: 18px;
            line-height: 1;
            font-style: normal;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            background: #0a0a0f;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        #header {
            padding: 10px 14px;
            border-bottom: 1px solid #13131f;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d0d1a;
            flex-shrink: 0;
        }

        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e05555;
            flex-shrink: 0;
            transition: background 0.4s, box-shadow 0.4s;
        }
        #status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e88;
        }

        #header .title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #3a7bd5;
            flex: 1;
        }

        #history-btn {
            background: none;
            border: 1px solid #1e2a3a;
            border-radius: 4px;
            color: #3a7bd5;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 4px 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: border-color 0.15s, background 0.15s;
        }
        #history-btn:hover { border-color: #3a7bd5; background: #0d1a2e; }
        #history-btn.hidden { display: none; }

        /* ── Config panel ── */
        #config-panel {
            display: none;
            flex-direction: column;
            gap: 14px;
            padding: 16px;
            border-bottom: 1px solid #13131f;
            background: #0d0d1a;
        }
        #config-panel.open { display: flex; }

        .config-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #3a5080;
            margin-bottom: 6px;
        }

        .config-select,
        .config-input {
            width: 100%;
            background: #0a0a15;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            padding: 8px 12px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .config-select:focus,
        .config-input:focus {
            border-color: #3a7bd5;
            box-shadow: 0 0 0 2px #3a7bd520;
        }
        .config-select { cursor: pointer; }
        .config-input.mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }

        .config-hint { font-size: 11px; color: #2a3a4a; margin-top: 5px; }

        .config-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }

        #config-feedback { font-size: 11px; color: #22c55e; flex: 1; }

        .config-save-btn {
            background: #1a2a4a;
            border: 1px solid #3a7bd5;
            color: #3a7bd5;
            border-radius: 6px;
            padding: 7px 18px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .config-save-btn:hover { background: #3a7bd5; color: #fff; }

        .config-cancel-btn {
            background: none;
            border: 1px solid #1a1a2e;
            color: #3a5080;
            border-radius: 6px;
            padding: 7px 18px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .config-cancel-btn:hover { border-color: #3a5080; color: #7090b0; }

        /* ── Chat ── */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: #1a1a2e transparent;
        }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 2px; }

        .message-row { display: flex; flex-direction: column; gap: 5px; max-width: 100%; }
        .message-row.user { align-items: flex-end; }
        .message-row.agent { align-items: flex-start; }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 4px;
        }

        .message-avatar {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }
        .agent .message-avatar { background: #1a2a4a; color: #3a7bd5; }
        .user .message-avatar { background: #1a2a3a; color: #7ab3ff; }

        .message-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .agent .message-label { color: #3a7bd5; }
        .user .message-label { color: #5a8ac0; }

        .message-bubble {
            padding: 11px 15px;
            border-radius: 12px;
            line-height: 1.65;
            max-width: 90%;
            word-break: break-word;
            position: relative;
        }

        .user .message-bubble {
            background: linear-gradient(135deg, #1a2a4a 0%, #0f1e35 100%);
            border: 1px solid #2a4a7a;
            color: #c9d8f0;
            border-radius: 12px 12px 2px 12px;
        }

        .agent .message-bubble {
            background: #0d0d1a;
            border: 1px solid #13132a;
            color: #c9d1d9;
            border-radius: 12px 12px 12px 2px;
            width: 100%;
            max-width: 100%;
        }

        .agent .message-bubble.loading {
            color: #3a5080;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3a7bd5;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Markdown */
        .message-bubble p { margin-bottom: 8px; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble strong { color: #e2e8f0; font-weight: 600; }
        .message-bubble em { color: #8ba3c0; }
        .message-bubble ul, .message-bubble ol { padding-left: 18px; margin-bottom: 8px; }
        .message-bubble li { margin-bottom: 3px; }
        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            color: #c9d8f0;
            font-weight: 600;
            margin: 14px 0 6px;
            line-height: 1.3;
        }
        .message-bubble h1 { font-size: 15px; border-bottom: 1px solid #13132a; padding-bottom: 6px; }
        .message-bubble h2 { font-size: 13px; }
        .message-bubble h3 { font-size: 12px; color: #5a8ac0; }
        .message-bubble a { color: #3a7bd5; text-decoration: none; }
        .message-bubble a:hover { text-decoration: underline; }

        .message-bubble code:not(pre code) {
            background: #0a0a1f;
            border: 1px solid #1a1a3a;
            color: #7ab3ff;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 11.5px;
        }

        .message-bubble pre {
            margin: 10px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1a1a2e;
        }

        .code-header {
            background: #0d0d20;
            padding: 6px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a2e;
        }
        .code-lang {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #3a7bd5;
        }
        .copy-btn {
            font-size: 10px;
            color: #3a5080;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: color 0.15s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .copy-btn:hover { color: #7ab3ff; }

        .message-bubble pre code {
            display: block;
            padding: 14px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-x: auto;
            background: #080810;
        }

        /* ── Image preview ── */
        #image-preview {
            padding: 6px 16px 0;
            display: none;
            align-items: center;
            gap: 8px;
            background: #0d0d1a;
        }
        #image-preview img {
            height: 44px;
            border-radius: 6px;
            border: 1px solid #1a1a2e;
            object-fit: cover;
        }
        #image-preview-name { font-size: 11px; color: #3a5080; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #image-remove {
            background: none;
            border: none;
            color: #3a3a5a;
            cursor: pointer;
            padding: 2px 4px;
            transition: color 0.15s;
            display: inline-flex;
            align-items: center;
        }
        #image-remove:hover { color: #e05555; }

        .msg-image {
            max-width: 100%;
            max-height: 260px;
            border-radius: 8px;
            border: 1px solid #1a1a2e;
            margin-bottom: 8px;
            display: block;
        }

        /* ── Input area ── */
        #input-area {
            padding: 12px 14px;
            border-top: 1px solid #13131f;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: #0d0d1a;
        }

        .icon-btn {
            background: none;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            color: #3a5080;
            cursor: pointer;
            padding: 7px 9px;
            line-height: 1;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .icon-btn:hover { border-color: #3a7bd5; color: #3a7bd5; background: #0d1a2e; }

        #user-input {
            flex: 1;
            background: #0a0a15;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            padding: 9px 13px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.55;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        #user-input:focus {
            border-color: #3a7bd5;
            box-shadow: 0 0 0 2px #3a7bd520;
        }
        #user-input::placeholder { color: #2a3a4a; }

        #send-btn {
            background: #1a2a4a;
            border: 1px solid #3a7bd5;
            color: #3a7bd5;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        #send-btn:hover { background: #3a7bd5; color: #fff; }
        #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ── Terminal output ── */
        .terminal-output {
            background: #0d1117;
            border: 1px solid #1e3a1e;
            border-radius: 6px;
            padding: 8px 10px;
            margin: 4px 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #7ee787;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .terminal-output .terminal-label {
            color: #58a6ff;
            font-size: 10px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .terminal-output .terminal-label::before {
            content: '▶';
            color: #3fb950;
        }
        .terminal-output .terminal-body {
            color: #e6edf3;
        }
        .terminal-output .stderr-chunk {
            color: #f85149;
        }

        /* ── Status bar ── */
        #status-bar {
            font-size: 11px;
            color: #3a7bd5;
            padding: 4px 14px;
            font-style: italic;
            letter-spacing: 0.03em;
            display: none;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            border-top: 1px solid #13131f;
            background: #0a0a0f;
        }
        #status-bar.visible {
            display: flex;
        }
        #status-bar::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3a7bd5;
            animation: pulse-dot 1.2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }

        /* ── Confirm write card ── */
        .confirm-card {
            border: 1px solid #2a4a7a;
            border-radius: 10px;
            background: #080c14;
            overflow: hidden;
            width: 100%;
        }

        .confirm-card-header {
            padding: 10px 14px;
            background: #0d1525;
            border-bottom: 1px solid #1a2a4a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .confirm-card-icon {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            background: #1a3a6a;
            color: #3a7bd5;
            font-size: 9px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .confirm-card-title {
            font-size: 11px;
            font-weight: 700;
            color: #7ab3ff;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .confirm-card-badge {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 3px;
        }
        .confirm-card-badge.new { background: #0d2a1a; color: #22c55e; border: 1px solid #22c55e44; }
        .confirm-card-badge.edit { background: #1a1a0a; color: #f59e0b; border: 1px solid #f59e0b44; }

        .confirm-diff {
            max-height: 420px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #2a2a3e transparent;
            background: #1e1e1e;
        }

        .diff-hunk-header {
            font-family: 'Consolas', 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #569cd6;
            background: #0d1926;
            padding: 2px 0;
            border-top: 1px solid #2a3a4a;
            border-bottom: 1px solid #2a3a4a;
            user-select: none;
        }
        .diff-hunk-header .diff-ln {
            display: inline-block;
            width: 38px;
            text-align: right;
            padding-right: 8px;
            color: #3a5a7a;
        }
        .diff-hunk-header .diff-ln + .diff-ln { width: 38px; }
        .diff-hunk-header .diff-sign { display: inline-block; width: 14px; color: #569cd6; }
        .diff-hunk-header .diff-text { color: #569cd6; font-style: italic; }

        .diff-line {
            display: flex;
            align-items: stretch;
            font-family: 'Consolas', 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            min-height: 19px;
        }
        .diff-line:hover { background: rgba(255,255,255,0.03); }

        .diff-line.removed { background: #3f1f1f; }
        .diff-line.removed:hover { background: #4a2020; }
        .diff-line.added   { background: #1a2f1a; }
        .diff-line.added:hover   { background: #1f3a1f; }
        .diff-line.context { background: transparent; }

        .diff-ln-col {
            display: inline-flex;
            flex-shrink: 0;
            user-select: none;
        }
        .diff-ln-num {
            width: 38px;
            text-align: right;
            padding: 0 6px 0 0;
            color: #4a4a6a;
            font-size: 11px;
            line-height: 1.6;
            background: #252526;
            border-right: 1px solid #2d2d2d;
        }
        .diff-line.removed .diff-ln-num { background: #2d1515; color: #7a3a3a; }
        .diff-line.added   .diff-ln-num { background: #152515; color: #3a7a3a; }

        .diff-sign-col {
            width: 14px;
            text-align: center;
            flex-shrink: 0;
            font-size: 12px;
            line-height: 1.6;
            padding: 0 2px;
        }
        .diff-line.removed .diff-sign-col { color: #f14c4c; }
        .diff-line.added   .diff-sign-col { color: #23d18b; }
        .diff-line.context .diff-sign-col { color: transparent; }

        .diff-content {
            flex: 1;
            padding: 0 8px;
            white-space: pre;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Sobrescreve cores do hljs apenas dentro do diff para não colidir */
        .diff-content .hljs-keyword   { color: #569cd6; }
        .diff-content .hljs-string    { color: #ce9178; }
        .diff-content .hljs-comment   { color: #6a9955; font-style: italic; }
        .diff-content .hljs-number    { color: #b5cea8; }
        .diff-content .hljs-built_in  { color: #4ec9b0; }
        .diff-content .hljs-title     { color: #dcdcaa; }
        .diff-content .hljs-params    { color: #9cdcfe; }
        .diff-content .hljs-variable  { color: #9cdcfe; }
        .diff-content .hljs-attr      { color: #9cdcfe; }
        .diff-content .hljs-type      { color: #4ec9b0; }
        .diff-content .hljs-literal   { color: #569cd6; }
        .diff-content .hljs-operator  { color: #d4d4d4; }
        .diff-line.removed .diff-content { color: #f4a0a0; }
        .diff-line.added   .diff-content { color: #a0d4a0; }
        .diff-line.context .diff-content { color: #d4d4d4; }

        .confirm-actions {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            border-top: 1px solid #1a2a4a;
            background: #0d1525;
            justify-content: flex-end;
        }

        .confirm-accept-btn {
            background: #0d2a1a;
            border: 1px solid #22c55e;
            color: #22c55e;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.15s, color 0.15s;
        }
        .confirm-accept-btn:hover { background: #22c55e; color: #000; }

        .confirm-reject-btn {
            background: none;
            border: 1px solid #3a1a1a;
            color: #805050;
            border-radius: 6px;
            padding: 6px 16px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .confirm-reject-btn:hover { border-color: #e05555; color: #e05555; }

        .confirm-decided {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 10px 14px;
            border-top: 1px solid #1a2a4a;
            background: #0d1525;
        }
        .confirm-decided.accepted { color: #22c55e; }
        .confirm-decided.rejected { color: #e05555; }

        /* ── Divider de data ── */
        .day-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1a2a3a;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .day-divider::before, .day-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #13132a;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="status-dot"></div>
        <span class="title">Eucode IA</span>
        <button id="history-btn" class="hidden"><span class="mi" style="font-size:14px">history</span>Retomar conversa</button>
    </div>

    <div id="config-panel">
        <div>
            <div class="config-label">Provedor</div>
            <select id="config-provider" class="config-select">
                <option value="lmstudio">LM Studio</option>
                <option value="anthropic">Anthropic / Ollama</option>
                <option value="ollama">Outro (OpenAI-compativel)</option>
            </select>
        </div>
        <div>
            <div class="config-label">Host</div>
            <input id="config-host-input" class="config-input mono" type="text" placeholder="http://localhost:1234" spellcheck="false">
            <div class="config-hint">Endereco completo com porta. Ex: http://10.100.0.22:11434</div>
        </div>
        <div>
            <div class="config-label">Modelo</div>
            <input id="config-model-input" class="config-input mono" type="text" placeholder="google/gemma-4-e4b" spellcheck="false" autocomplete="off">
            <div class="config-hint">Nome exato do modelo carregado. Vazio usa o padrao do servidor.</div>
        </div>
        <div>
            <div class="config-label">API Key <span style="color:#1a2a3a;font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></div>
            <input id="config-key-input" class="config-input mono" type="password" placeholder="sk-..." spellcheck="false" autocomplete="off">
        </div>
        <div class="config-actions">
            <span id="config-feedback"></span>
            <button class="config-cancel-btn" id="config-cancel-btn">Cancelar</button>
            <button class="config-save-btn" id="config-save-btn">Salvar</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="message-row agent">
            <div class="message-meta">
                <div class="message-avatar"><span class="mi" style="font-size:12px">smart_toy</span></div>
                <span class="message-label">Eucode IA</span>
            </div>
            <div class="message-bubble">Ola! Como posso ajudar?</div>
        </div>
    </div>

    <div id="status-bar" style="display:none"></div>

    <div id="image-preview">
        <img id="image-preview-img" src="" alt="preview">
        <span id="image-preview-name"></span>
        <button id="image-remove" title="Remover"><span class="mi" style="font-size:16px">close</span></button>
    </div>

    <div id="input-area">
        <button id="config-btn" class="icon-btn" title="Configuracoes"><span class="mi">settings</span></button>
        <button id="image-btn" class="icon-btn" title="Anexar imagem"><span class="mi">add_photo_alternate</span></button>
        <textarea id="user-input" rows="1" placeholder="Pergunte algo ou descreva uma tarefa..."></textarea>
        <button id="send-btn"><span class="mi" style="font-size:16px">send</span>Enviar</button>
    </div>
    <input type="file" id="image-input" accept="image/*" style="display:none">

    <script>
        const vscode = acquireVsCodeApi();
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');

        const imageBtn = document.getElementById('image-btn');
        const imageInput = document.getElementById('image-input');
        const imagePreview = document.getElementById('image-preview');
        const imagePreviewImg = document.getElementById('image-preview-img');
        const imagePreviewName = document.getElementById('image-preview-name');
        const imageRemove = document.getElementById('image-remove');

        const configBtn = document.getElementById('config-btn');
        const configPanel = document.getElementById('config-panel');
        const configProvider = document.getElementById('config-provider');
        const configHostInput = document.getElementById('config-host-input');
        const configModelInput = document.getElementById('config-model-input');
        const configKeyInput = document.getElementById('config-key-input');
        const configSaveBtn = document.getElementById('config-save-btn');
        const configCancelBtn = document.getElementById('config-cancel-btn');
        const configFeedback = document.getElementById('config-feedback');
        const historyBtn = document.getElementById('history-btn');

        let pendingImage = null;
        let savedSettings = { provider: 'lmstudio', apiHost: '', apiKey: '', model: '' };
        let pendingHistory = null;

        // ── Config ──
        configBtn.addEventListener('click', () => {
            const isOpen = configPanel.classList.toggle('open');
            if (isOpen) {
                configProvider.value = savedSettings.provider;
                configHostInput.value = savedSettings.apiHost;
                configModelInput.value = savedSettings.model || '';
                configKeyInput.value = '';
                configFeedback.textContent = '';
            }
        });

        configCancelBtn.addEventListener('click', () => {
            configPanel.classList.remove('open');
            configFeedback.textContent = '';
        });

        configSaveBtn.addEventListener('click', () => {
            const host = configHostInput.value.trim();
            if (!host) { return; }
            vscode.postMessage({
                command: 'save_config',
                provider: configProvider.value,
                apiHost: host,
                model: configModelInput.value.trim(),
                apiKey: configKeyInput.value.trim(),
            });
        });

        // ── History ──
        historyBtn.addEventListener('click', () => {
            if (!pendingHistory) { return; }
            restoreHistory(pendingHistory);
            pendingHistory = null;
            historyBtn.classList.add('hidden');
        });

        function restoreHistory(entries) {
            const rows = chatContainer.querySelectorAll('.message-row');
            if (rows.length === 1) { rows[0].remove(); }
            entries.forEach(e => appendMessage(e.content, e.role === 'user' ? 'user' : 'agent'));
        }

        // ── Image ──
        imageBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) { return; }
            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                const match = dataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
                if (!match) { return; }
                pendingImage = { base64: match[2], mimeType: match[1], name: file.name };
                imagePreviewImg.src = dataUrl;
                imagePreviewName.textContent = file.name;
                imagePreview.style.display = 'flex';
            };
            reader.readAsDataURL(file);
            this.value = '';
        });

        imageRemove.addEventListener('click', () => {
            pendingImage = null;
            imagePreview.style.display = 'none';
            imagePreviewImg.src = '';
        });

        // ── Markdown ──
        marked.setOptions({ breaks: true });
        const renderer = new marked.Renderer();
        renderer.code = function(code, lang) {
            const language = lang || 'plaintext';
            const highlighted = hljs.getLanguage(language)
                ? hljs.highlight(code, { language }).value
                : hljs.highlightAuto(code).value;
            return `<pre><div class="code-header"><span class="code-lang">${language}</span><button class="copy-btn" onclick="copyCode(this)"><span class="mi" style="font-size:12px">content_copy</span>Copiar</button></div><code class="hljs language-${language}">${highlighted}</code></pre>`;
        };
        marked.use({ renderer });

        function copyCode(btn) {
            const code = btn.closest('pre').querySelector('code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                btn.innerHTML = '<span class="mi" style="font-size:12px">check</span>Copiado';
                setTimeout(() => { btn.innerHTML = '<span class="mi" style="font-size:12px">content_copy</span>Copiar'; }, 2000);
            });
        }

        // ── Messages ──
        function appendMessage(text, role, isLoading = false, imageDataUrl = null) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const meta = document.createElement('div');
            meta.className = 'message-meta';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            if (role === 'user') {
                avatar.textContent = 'VC';
            } else {
                avatar.innerHTML = '<span class="mi" style="font-size:12px">smart_toy</span>';
            }

            const label = document.createElement('span');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'Voce' : 'Eucode IA';

            if (role === 'agent') {
                meta.appendChild(avatar);
                meta.appendChild(label);
            } else {
                meta.appendChild(label);
                meta.appendChild(avatar);
            }

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble' + (isLoading ? ' loading' : '');

            if (imageDataUrl) {
                const img = document.createElement('img');
                img.src = imageDataUrl;
                img.className = 'msg-image';
                bubble.appendChild(img);
            }

            if (isLoading) {
                const dots = document.createElement('div');
                dots.className = 'loading-dots';
                dots.innerHTML = '<span></span><span></span><span></span>';
                bubble.appendChild(document.createTextNode('Processando'));
                bubble.appendChild(dots);
                bubble.dataset.loading = 'true';
            } else if (role === 'agent') {
                const md = document.createElement('div');
                md.innerHTML = marked.parse(text);
                bubble.appendChild(md);
            } else if (text) {
                bubble.appendChild(document.createTextNode(text));
            }

            row.appendChild(meta);
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return row;
        }

        // ── Confirm write card ──
        // ── Diff engine ──
        function computeDiff(beforeLines, afterLines) {
            // Myers LCS-based diff
            const m = beforeLines.length, n = afterLines.length;
            const max = m + n;
            const v = new Array(2 * max + 1).fill(0);
            const trace = [];
            outer: for (let d = 0; d <= max; d++) {
                trace.push(v.slice());
                for (let k = -d; k <= d; k += 2) {
                    let x;
                    if (k === -d || (k !== d && v[k - 1 + max] < v[k + 1 + max])) {
                        x = v[k + 1 + max];
                    } else {
                        x = v[k - 1 + max] + 1;
                    }
                    let y = x - k;
                    while (x < m && y < n && beforeLines[x] === afterLines[y]) { x++; y++; }
                    v[k + max] = x;
                    if (x >= m && y >= n) break outer;
                }
            }
            // Backtrack
            const ops = [];
            let x = m, y = n;
            for (let d = trace.length - 1; d >= 0; d--) {
                const vv = trace[d];
                const k = x - y;
                let prevK;
                if (k === -d || (k !== d && vv[k - 1 + max] < vv[k + 1 + max])) {
                    prevK = k + 1;
                } else {
                    prevK = k - 1;
                }
                const prevX = vv[prevK + max];
                const prevY = prevX - prevK;
                while (x > prevX && y > prevY) { ops.push({ type: 'eq', bLine: x - 1, aLine: y - 1 }); x--; y--; }
                if (d > 0) {
                    if (x === prevX) { ops.push({ type: 'add', aLine: y - 1 }); y--; }
                    else             { ops.push({ type: 'del', bLine: x - 1 }); x--; }
                }
            }
            return ops.reverse();
        }

        function buildDiffView(beforeText, afterText, lang) {
            const beforeLines = beforeText ? beforeText.split('\n') : [];
            const afterLines  = afterText.split('\n');
            const CONTEXT = 3;
            const container = document.createElement('div');
            container.className = 'confirm-diff';

            // For new files, show all lines as added
            const ops = beforeText
                ? computeDiff(beforeLines, afterLines)
                : afterLines.map((_, i) => ({ type: 'add', aLine: i }));

            // Highlight both sides
            function highlight(line) {
                const el = document.createElement('span');
                try {
                    el.innerHTML = lang && hljs.getLanguage(lang)
                        ? hljs.highlight(line, { language: lang }).value
                        : hljs.highlightAuto(line).value;
                } catch(e) { el.textContent = line; }
                return el;
            }

            // Find changed line indices to know what context to show
            const changedOpIdx = new Set();
            ops.forEach((op, i) => { if (op.type !== 'eq') changedOpIdx.add(i); });
            const visibleOpIdx = new Set();
            changedOpIdx.forEach(ci => {
                for (let d = -CONTEXT; d <= CONTEXT; d++) {
                    if (ci + d >= 0 && ci + d < ops.length) visibleOpIdx.add(ci + d);
                }
            });

            let bNum = 1, aNum = 1;
            let lastVisible = -1;

            ops.forEach((op, i) => {
                if (op.type === 'eq') { bNum++; aNum++; }

                if (!visibleOpIdx.has(i)) {
                    if (op.type === 'eq') { /* skip silently */ }
                    return;
                }

                // Hunk separator
                if (lastVisible !== -1 && i > lastVisible + 1) {
                    const hunk = document.createElement('div');
                    hunk.className = 'diff-hunk-header';
                    hunk.innerHTML =
                        `<span class="diff-ln"></span><span class="diff-ln"></span>` +
                        `<span class="diff-sign">@@</span> ` +
                        `<span class="diff-text">... ${i - lastVisible - 1} linha(s) ocultada(s) ...</span>`;
                    container.appendChild(hunk);
                }
                lastVisible = i;

                const row = document.createElement('div');

                if (op.type === 'eq') {
                    const lineNum = op.bLine !== undefined ? op.bLine + 1 : bNum;
                    const aLineNum = op.aLine !== undefined ? op.aLine + 1 : aNum;
                    row.className = 'diff-line context';
                    row.innerHTML =
                        `<span class="diff-ln-col"><span class="diff-ln-num">${lineNum}</span><span class="diff-ln-num">${aLineNum}</span></span>` +
                        `<span class="diff-sign-col"> </span>`;
                    const content = document.createElement('span');
                    content.className = 'diff-content';
                    content.appendChild(highlight(beforeLines[op.bLine] ?? ''));
                    row.appendChild(content);

                } else if (op.type === 'del') {
                    const lineNum = op.bLine + 1;
                    row.className = 'diff-line removed';
                    row.innerHTML =
                        `<span class="diff-ln-col"><span class="diff-ln-num">${lineNum}</span><span class="diff-ln-num"> </span></span>` +
                        `<span class="diff-sign-col">-</span>`;
                    const content = document.createElement('span');
                    content.className = 'diff-content';
                    content.appendChild(highlight(beforeLines[op.bLine]));
                    row.appendChild(content);

                } else if (op.type === 'add') {
                    const lineNum = op.aLine + 1;
                    row.className = 'diff-line added';
                    row.innerHTML =
                        `<span class="diff-ln-col"><span class="diff-ln-num"> </span><span class="diff-ln-num">${lineNum}</span></span>` +
                        `<span class="diff-sign-col">+</span>`;
                    const content = document.createElement('span');
                    content.className = 'diff-content';
                    content.appendChild(highlight(afterLines[op.aLine]));
                    row.appendChild(content);
                }

                container.appendChild(row);

                if (op.type === 'eq') { /* already counted */ }
            });

            if (container.children.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'padding:10px 14px;color:#6a9955;font-size:11px;font-family:monospace';
                empty.textContent = '(sem alteracoes)';
                container.appendChild(empty);
            }

            return container;
        }

        function guessLang(filePath) {
            const ext = filePath.split('.').pop().toLowerCase();
            const map = { ts: 'typescript', tsx: 'typescript', js: 'javascript', jsx: 'javascript',
                          py: 'python', rs: 'rust', go: 'go', java: 'java', cs: 'csharp',
                          cpp: 'cpp', c: 'c', html: 'html', css: 'css', json: 'json',
                          md: 'markdown', sh: 'bash', yaml: 'yaml', yml: 'yaml', toml: 'ini' };
            return map[ext] || null;
        }

        function appendConfirmCard(id, filePath, before, after) {
            const isNew = before === null;

            const row = document.createElement('div');
            row.className = 'message-row agent';

            const meta = document.createElement('div');
            meta.className = 'message-meta';
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'EI';
            const label = document.createElement('span');
            label.className = 'message-label';
            label.textContent = 'Eucode IA';
            meta.appendChild(avatar);
            meta.appendChild(label);

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.style.padding = '0';
            bubble.style.overflow = 'hidden';
            bubble.style.width = '100%';
            bubble.style.maxWidth = '100%';

            const card = document.createElement('div');
            card.className = 'confirm-card';

            // Header
            const header = document.createElement('div');
            header.className = 'confirm-card-header';
            const icon = document.createElement('div');
            icon.className = 'confirm-card-icon';
            icon.innerHTML = isNew
                ? '<span class="mi" style="font-size:12px">add</span>'
                : '<span class="mi" style="font-size:12px">edit</span>';
            const title = document.createElement('div');
            title.className = 'confirm-card-title';
            title.textContent = filePath;
            title.title = filePath;
            const badge = document.createElement('span');
            badge.className = 'confirm-card-badge ' + (isNew ? 'new' : 'edit');
            badge.textContent = isNew ? 'Novo' : 'Editar';
            header.appendChild(icon);
            header.appendChild(title);
            header.appendChild(badge);

            // Diff view
            const lang = guessLang(filePath);
            const diffView = buildDiffView(before, after, lang);

            // Actions
            const actions = document.createElement('div');
            actions.className = 'confirm-actions';

            const rejectBtn = document.createElement('button');
            rejectBtn.className = 'confirm-reject-btn';
            rejectBtn.innerHTML = '<span class="mi" style="font-size:14px">close</span>Rejeitar';

            const acceptBtn = document.createElement('button');
            acceptBtn.className = 'confirm-accept-btn';
            acceptBtn.innerHTML = '<span class="mi" style="font-size:14px">check</span>Aceitar';

            function decide(approved) {
                actions.remove();
                const decided = document.createElement('div');
                decided.className = 'confirm-decided ' + (approved ? 'accepted' : 'rejected');
                decided.innerHTML = approved
                    ? '<span class="mi" style="font-size:14px;vertical-align:middle">check_circle</span> Alteracao aceita'
                    : '<span class="mi" style="font-size:14px;vertical-align:middle">cancel</span> Alteracao rejeitada';
                card.appendChild(decided);
                vscode.postMessage({ command: 'confirm_write_response', id, approved });
            }

            acceptBtn.addEventListener('click', () => decide(true));
            rejectBtn.addEventListener('click', () => decide(false));
            actions.appendChild(rejectBtn);
            actions.appendChild(acceptBtn);

            card.appendChild(header);
            card.appendChild(diffView);
            card.appendChild(actions);
            bubble.appendChild(card);
            row.appendChild(meta);
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ── Messages from extension ──
        window.addEventListener('message', function(event) {
            const msg = event.data;

            if (msg.command === 'load_config') {
                savedSettings = { provider: msg.provider, apiHost: msg.apiHost, apiKey: msg.apiKey || '', model: msg.model || '' };
            } else if (msg.command === 'load_history') {
                if (msg.entries && msg.entries.length > 0) {
                    pendingHistory = msg.entries;
                    historyBtn.classList.remove('hidden');
                }
            } else if (msg.command === 'connection_status') {
                statusDot.classList.toggle('online', msg.online);
            } else if (msg.command === 'config_saved') {
                savedSettings.provider = configProvider.value;
                savedSettings.apiHost = configHostInput.value.trim();
                savedSettings.model = configModelInput.value.trim();
                configFeedback.textContent = 'Configuracao salva.';
                setTimeout(() => {
                    configFeedback.textContent = '';
                    configPanel.classList.remove('open');
                }, 1200);
            } else if (msg.command === 'status') {
                updateStatus(msg.text);
            } else if (msg.command === 'command_start') {
                startTerminal(msg.cmd);
            } else if (msg.command === 'command_output') {
                appendCommandChunk(msg.chunk);
            } else if (msg.command === 'confirm_write') {
                clearStatus();
                appendConfirmCard(msg.id, msg.filePath, msg.before, msg.after);
            } else if (msg.command === 'agent_response') {
                clearStatus();
                finalizeTerminal();
                const loading = chatContainer.querySelector('[data-loading="true"]');
                if (loading) { loading.closest('.message-row').remove(); }
                appendMessage(msg.text, 'agent');
                sendBtn.disabled = false;
            }
        });

        const statusBar = document.getElementById('status-bar');

        function updateStatus(text) {
            statusBar.textContent = text;
            statusBar.classList.add('visible');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearStatus() {
            statusBar.classList.remove('visible');
            statusBar.textContent = '';
        }

        let activeTerminal = null;
        let activeTerminalWrapper = null;

        function startTerminal(cmd) {
            // Finaliza terminal anterior se existir
            finalizeTerminal();

            const loadingEl = chatContainer.querySelector('[data-loading="true"]');
            const anchor = loadingEl ? loadingEl.closest('.message-row') : null;

            const wrapper = document.createElement('div');
            wrapper.className = 'terminal-output';
            wrapper.id = 'active-terminal';

            const label = document.createElement('div');
            label.className = 'terminal-label';
            label.textContent = cmd || 'Terminal';

            const body = document.createElement('div');
            body.className = 'terminal-body';
            body.id = 'active-terminal-body';

            wrapper.appendChild(label);
            wrapper.appendChild(body);

            if (anchor) {
                chatContainer.insertBefore(wrapper, anchor);
            } else {
                chatContainer.appendChild(wrapper);
            }

            activeTerminal = body;
            activeTerminalWrapper = wrapper;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendCommandChunk(chunk) {
            // Cria bloco se command_start não chegou por algum motivo
            if (!activeTerminal) { startTerminal(''); }
            const span = document.createElement('span');
            span.textContent = chunk;
            activeTerminal.appendChild(span);
            if (activeTerminalWrapper) { activeTerminalWrapper.scrollTop = activeTerminalWrapper.scrollHeight; }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function finalizeTerminal() {
            activeTerminal = null;
            activeTerminalWrapper = null;
            const el = document.getElementById('active-terminal');
            if (el) { el.removeAttribute('id'); }
            const body = document.getElementById('active-terminal-body');
            if (body) { body.removeAttribute('id'); }
        }

        // ── Send ──
        function sendMessage() {
            const text = input.value.trim();
            if (!text && !pendingImage) { return; }

            const imageDataUrl = pendingImage ? `data:${pendingImage.mimeType};base64,${pendingImage.base64}` : null;
            appendMessage(text, 'user', false, imageDataUrl);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            appendMessage('', 'agent', true);

            vscode.postMessage({
                command: 'user_input',
                text: text || '(analise esta imagem)',
                image: pendingImage ? { base64: pendingImage.base64, mimeType: pendingImage.mimeType } : null,
            });

            pendingImage = null;
            imagePreview.style.display = 'none';
            imagePreviewImg.src = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
        });

        vscode.postMessage({ command: 'webview_ready' });
    </script>
</body>
